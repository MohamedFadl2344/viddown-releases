<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ff7b00" />
      <stop offset="100%" stop-color="#ff4500" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="256" cy="256" r="240" fill="url(#brandGradient)" filter="url(#glow)" />
  
  <!-- Outer Ring -->
  <circle cx="256" cy="256" r="210" fill="none" stroke="#ffffff" stroke-width="12" stroke-opacity="0.2" />

  <!-- Lightning Arrow Icon -->
  <path d="M290 120 L160 280 H240 L210 400 L350 240 H270 Z" fill="#ffffff" />
  
  <!-- Download Base Line -->
  <rect x="180" y="420" width="152" height="24" rx="12" fill="#ffffff" fill-opacity="0.9" />
</svg>
